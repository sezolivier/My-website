<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choix de langue | Language Selection</title>
  <meta name="description" content="Choisissez votre langue / Choose your language">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f7f9fc;
      color: #1f2937;
    }

    .container {
      max-width: 700px;
      margin: 80px auto;
      padding: 32px;
      background-color: #ffffff;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 2rem;
    }

    p {
      margin-bottom: 24px;
      font-size: 1rem;
      line-height: 1.6;
      color: #4b5563;
    }

    .language-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background-color: #ffffff;
      text-decoration: none;
      color: #111827;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .lang-btn:hover {
      background-color: #f3f4f6;
      border-color: #9ca3af;
      transform: translateY(-1px);
    }

    .flag {
      font-size: 1.3rem;
    }

    .small-text {
      margin-top: 24px;
      font-size: 0.92rem;
      color: #6b7280;
    }
  </style>

  <script>
  function setLanguage(lang) {
    localStorage.setItem('preferredLanguage', lang);
  }

  document.addEventListener('DOMContentLoaded', function () {
    const savedLanguage = localStorage.getItem('preferredLanguage');
    const browserLanguage = (navigator.language || navigator.userLanguage || '').toLowerCase();

    let target = './en/';

    if (savedLanguage === 'fr') {
      target = './fr/';
    } else if (savedLanguage === 'en') {
      target = './en/';
    } else if (browserLanguage.startsWith('fr')) {
      target = './fr/';
    }

    window.location.replace(target);
  });
</script>
</head>
<body>
  <div class="container">
    <h1>Choisissez votre langue / Choose your language</h1>

    <p>
      Sélectionnez la version française ou anglaise du site.<br>
      Select the French or English version of the website.
    </p>

    <div class="language-buttons">
      <a class="lang-btn" href="./fr/" onclick="setLanguage('fr')">
        <span class="flag">🇫🇷</span>
        <span>Français</span>
      </a>

      <a class="lang-btn" href="./en/" onclick="setLanguage('en')">
        <span class="flag">🇬🇧</span>
        <span>English</span>
      </a>
    </div>

    <div class="small-text">
      Votre choix peut être mémorisé pour les prochaines visites.<br>
      Your choice can be remembered for future visits.
    </div>
  </div>
</body>
</html>
